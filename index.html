<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LR PvP Rank Usage</title>
  <meta name="description" content="LINE Rangers 傳奇段位 PvP 角色使用率統計工具">
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">LINE Rangers Tool</p>
      <h1>LR PvP Rank Usage</h1>
      <p class="subtitle">統計 PvP 排行榜玩家隊伍中的角色使用率，並產生 Discord 公告文字。</p>
    </div>
  </header>

  <main class="page">
    <section class="panel controls">
      <h2>統計設定</h2>

      <div class="form-grid">
        <label>
          段位
          <select id="leagueSelect">
            <option value="LEGEND" selected>傳奇 LEGEND</option>
            <option value="MASTER_1">大師1 MASTER_1</option>
            <option value="MASTER_2">大師2 MASTER_2</option>
            <option value="MASTER_3">大師3 MASTER_3</option>
            <option value="DIAMOND_1">鑽石1 DIAMOND_1</option>
            <option value="DIAMOND_2">鑽石2 DIAMOND_2</option>
            <option value="DIAMOND_3">鑽石3 DIAMOND_3</option>
            <option value="GOLD_1">黃金1 GOLD_1</option>
          </select>
        </label>

        <label>
          Discord 日期標題
          <input id="dateInput" type="text" placeholder="例如：6/5">
        </label>

        <label>
          統計玩家數
          <select id="limitSelect">
            <option value="10">前 10 名</option>
            <option value="50">前 50 名</option>
            <option value="100" selected>前 100 名</option>
          </select>
        </label>
      </div>

      <div class="button-row">
        <button id="runBtn" type="button">開始統計</button>
        <button id="copyBtn" type="button" disabled>複製 Discord 文字</button>
        <button id="downloadBtn" type="button" disabled>下載 JSON</button>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <p id="statusText">尚未開始</p>
      </div>
    </section>

    <section class="panel">
      <h2>統計結果</h2>
      <div class="result-grid">
        <article>
          <h3>前 10 名玩家</h3>
          <pre id="top10Output">尚無資料</pre>
        </article>
        <article>
          <h3>前 50 名玩家</h3>
          <pre id="top50Output">尚無資料</pre>
        </article>
        <article>
          <h3>前 100 名玩家</h3>
          <pre id="top100Output">尚無資料</pre>
        </article>
        <article>
          <h3>目前統計範圍</h3>
          <pre id="allOutput">尚無資料</pre>
        </article>
      </div>
    </section>

    <section class="panel">
      <h2>Discord 公告文字</h2>
      <textarea id="discordOutput" readonly placeholder="統計完成後會出現在這裡"></textarea>
    </section>
  </main>

  <footer class="site-footer">
    <p>Data source: rangers.lerico.net API</p>
  </footer>

  <script src="./assets/app.js"></script>
</body>
</html>
